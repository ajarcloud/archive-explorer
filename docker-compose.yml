services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/app.db
      - JWT_SECRET=change-me-in-production
      - UPLOAD_DIR=/app/data/uploads
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  app_data:
